name: 🏁 Windows Builds
on:
  workflow_call:
    inputs:
      base-branch:
        description: 'Base branch to use for the builds'
        type: string
      repo:
        description: 'Repository to use for the build'
        type: string
      tag:
        description: 'tag to use for the build'
        type: string
      module_flags:
        description: 'Extra module flags, e.g. module_webm_enabled=no'
        type: string
      template_module_flags:
        description: 'Extra module flags for template build, e.g. module_webm_enabled=no'
        type: string

# Global Settings
# SCONS_CACHE for windows must be set in the build environment
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Used for the cache key. Add version suffix to force clean build.
  GODOT_BASE_BRANCH: ${{ inputs.base-branch }}
  SCONSFLAGS: verbose=yes warnings=extra strict_checks=yes debug_symbols=no ${{ inputs.module_flags }} use_static_cpp=yes
  LLVM_MINGW_PREFIX: ${{ github.workspace }}/llvm-mingw
  PYTHONIOENCODING: utf8

jobs:
  build-windows:
    runs-on: windows-latest
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Editor (target=editor, arch=x86_64)
            target: editor
            scons-flags: arch=x86_64
            compiler-flags: use_mingw=yes
            lto: lto=full
            toolchain: mingw-gcc
            mingw-msystem: MINGW64
            build-mono: false
            mono-flags: ''

          - name: Editor (target=editor, arch=arm64)
            target: editor
            scons-flags: arch=arm64
            compiler-flags: use_mingw=yes use_llvm=yes
            lto: lto=thin
            toolchain: mingw-llvm
            mingw-msystem: CLANGARM64
            build-mono: false
            mono-flags: ''

          - name: Template (target=template_release, arch=x86_64)
            target: template_release
            scons-flags: arch=x86_64
            compiler-flags: use_mingw=yes
            lto: lto=full
            toolchain: mingw-gcc
            mingw-msystem: MINGW64
            build-mono: false
            mono-flags: ''

          - name: Template (target=template_release, arch=x86)
            target: template_release
            scons-flags: arch=x86
            compiler-flags: use_mingw=yes
            lto: lto=full
            toolchain: mingw-gcc
            mingw-msystem: MINGW32
            build-mono: false
            mono-flags: ''

          - name: Template (target=template_release, arch=arm64)
            target: template_release
            scons-flags: arch=arm64
            compiler-flags: use_mingw=yes use_llvm=yes
            lto: lto=thin
            toolchain: mingw-llvm
            mingw-msystem: CLANGARM64
            build-mono: false
            mono-flags: ''

          - name: Template (target=template_debug, arch=x86_64)
            target: template_debug
            scons-flags: arch=x86_64
            compiler-flags: use_mingw=yes
            lto: lto=full
            toolchain: mingw-gcc
            mingw-msystem: MINGW64
            build-mono: false
            mono-flags: ''

          - name: Template (target=template_debug, arch=x86)
            target: template_debug
            scons-flags: arch=x86
            compiler-flags: use_mingw=yes
            lto: lto=full
            toolchain: mingw-gcc
            mingw-msystem: MINGW32
            build-mono: false
            mono-flags: ''

          - name: Template (target=template_debug, arch=arm64)
            target: template_debug
            scons-flags: arch=arm64
            compiler-flags: use_mingw=yes use_llvm=yes
            lto: lto=thin
            toolchain: mingw-llvm
            mingw-msystem: CLANGARM64
            build-mono: false
            mono-flags: ''

          - name: Editor Mono (target=editor, arch=x86_64)
            target: editor
            scons-flags: arch=x86_64
            compiler-flags: use_mingw=yes
            lto: lto=full
            toolchain: mingw-gcc
            mingw-msystem: MINGW64
            build-mono: true
            mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes

          - name: Template Mono (target=template_release, arch=x86_64)
            target: template_release
            scons-flags: arch=x86_64
            compiler-flags: use_mingw=yes
            lto: lto=full
            toolchain: mingw-gcc
            mingw-msystem: MINGW64
            build-mono: true
            mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes

          - name: Template Mono (target=template_debug, arch=x86_64)
            target: template_debug
            scons-flags: arch=x86_64
            compiler-flags: use_mingw=yes
            lto: lto=full
            toolchain: mingw-gcc
            mingw-msystem: MINGW64
            build-mono: true
            mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes

          - name: Editor Mono (target=editor, arch=arm64)
            target: editor
            scons-flags: arch=arm64
            compiler-flags: use_mingw=yes use_llvm=yes
            lto: lto=thin
            toolchain: mingw-llvm
            mingw-msystem: CLANGARM64
            build-mono: true
            mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes

          - name: Template Mono (target=template_release, arch=arm64)
            target: template_release
            scons-flags: arch=arm64
            compiler-flags: use_mingw=yes use_llvm=yes
            lto: lto=thin
            toolchain: mingw-llvm
            mingw-msystem: CLANGARM64
            build-mono: true
            mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes

          - name: Template Mono (target=template_debug, arch=arm64)
            target: template_debug
            scons-flags: arch=arm64
            compiler-flags: use_mingw=yes use_llvm=yes
            lto: lto=thin
            toolchain: mingw-llvm
            mingw-msystem: CLANGARM64
            build-mono: true
            mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.tag }}
          submodules: recursive

      - name: Setup MinGW-w64 GCC
        if: matrix.toolchain == 'mingw-gcc'
        shell: bash
        run: |
          if [ "${{ matrix.mingw-msystem }}" = "MINGW64" ]; then
            PACKAGE=mingw-w64-x86_64-toolchain
            echo "MINGW_PREFIX=C:/msys64/mingw64" >> "$GITHUB_ENV"
          else
            PACKAGE=mingw-w64-i686-toolchain
            echo "MINGW_PREFIX=C:/msys64/mingw32" >> "$GITHUB_ENV"
          fi
          echo "MSYSTEM=${{ matrix.mingw-msystem }}" >> "$GITHUB_ENV"
          C:/msys64/usr/bin/bash.exe -lc "pacman -Sy --noconfirm --needed $PACKAGE"

      - name: Setup llvm-mingw
        if: matrix.toolchain == 'mingw-llvm'
        shell: bash
        run: |
          curl -L -o llvm-mingw.zip https://github.com/mstorsjo/llvm-mingw/releases/download/20241119/llvm-mingw-20241119-ucrt-x86_64.zip
          unzip -q llvm-mingw.zip
          rm llvm-mingw.zip
          mv llvm-mingw-* "$LLVM_MINGW_PREFIX"
          MINGW_PREFIX=$(echo "$LLVM_MINGW_PREFIX" | sed 's|\\|/|g')
          echo "MINGW_PREFIX=$MINGW_PREFIX" >> "$GITHUB_ENV"
          echo "MSYSTEM=${{ matrix.mingw-msystem }}" >> "$GITHUB_ENV"
          echo "$MINGW_PREFIX/bin" >> "$GITHUB_PATH"

      - name: Setup MinGW-w64 GCC for Mono glue
        if: matrix.build-mono && matrix.toolchain == 'mingw-llvm'
        shell: bash
        run: |
          C:/msys64/usr/bin/bash.exe -lc "pacman -Sy --noconfirm --needed mingw-w64-x86_64-toolchain"

      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: windows-${{ matrix.target }}${{ matrix.mono-flags }}-${{ matrix.scons-flags }}-${{ matrix.toolchain }}-${{ matrix.lto }}
        continue-on-error: true

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      - name: Download Direct3D 12 SDK components
        shell: sh
        id: d3d12-sdk
        run: |
          if python ./misc/scripts/install_d3d12_sdk_windows.py; then
            echo "D3D12_ENABLED=yes" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Windows: Direct3D 12 SDK installation failed, building without Direct3D 12 support."
            echo "D3D12_ENABLED=no" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Download pre-built ANGLE
        shell: sh
        id: angle-sdk
        run: |
          if python ./misc/scripts/install_angle.py; then
            echo "ANGLE_ENABLED=yes" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::ANGLE SDK installation failed, building without ANGLE support."
            echo "ANGLE_ENABLED=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Download WinRT components
        shell: sh
        run: python ./misc/scripts/install_winrt.py
        continue-on-error: true

      - name: Download pre-built AccessKit
        shell: sh
        id: accesskit-sdk
        run: |
          if python ./misc/scripts/install_accesskit.py; then
            echo "ACCESSKIT_ENABLED=yes" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::AccessKit SDK installation failed, building without AccessKit support."
            echo "ACCESSKIT_ENABLED=no" >> "$GITHUB_OUTPUT"
          fi

# Mono
      - name: Setup .NET SDK
        if: matrix.build-mono
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.100'

      - name: Mono tools build (pre-glue)
        if: matrix.build-mono
        uses: ./.github/actions/godot-build
        with:
          scons-flags: arch=x86_64 use_mingw=yes lto=full module_mono_enabled=yes mono_glue=no ${{ inputs.module_flags }} d3d12=${{ steps.d3d12-sdk.outputs.D3D12_ENABLED }} angle=${{ steps.angle-sdk.outputs.ANGLE_ENABLED }} accesskit=${{ steps.accesskit-sdk.outputs.ACCESSKIT_ENABLED }}
          platform: windows
          target: editor
        env:
          MINGW_PREFIX: C:/msys64/mingw64
          MSYSTEM: MINGW64
          # Godot checks MSVC before MSYS2; blank it so MinGW arch detection wins.
          VCTOOLSINSTALLDIR: ''

      - name: Generate C# glue
        if: matrix.build-mono
        run: |
          .\bin\godot.windows.editor.x86_64.mono.exe --headless --generate-mono-glue .\modules\mono\glue

# Compilation

      - name: Compilation (editor)
        if: matrix.target == 'editor'
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} ${{ matrix.scons-flags }} ${{ matrix.compiler-flags }} ${{ matrix.lto }} ${{ inputs.module_flags }} ${{ matrix.mono-flags }} d3d12=${{ steps.d3d12-sdk.outputs.D3D12_ENABLED }} angle=${{ steps.angle-sdk.outputs.ANGLE_ENABLED }} accesskit=${{ steps.accesskit-sdk.outputs.ACCESSKIT_ENABLED }}
          platform: windows
          target: ${{ matrix.target }}
        env:
          MSYSTEM: ${{ matrix.mingw-msystem }}
          # Godot checks MSVC before MSYS2; blank it so MinGW arch detection wins.
          VCTOOLSINSTALLDIR: ''

      - name: Compilation (template)
        if: matrix.target != 'editor'
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} ${{ matrix.scons-flags }} ${{ matrix.compiler-flags }} ${{ matrix.lto }} ${{ inputs.template_module_flags }} ${{ matrix.mono-flags }} d3d12=${{ steps.d3d12-sdk.outputs.D3D12_ENABLED }} angle=${{ steps.angle-sdk.outputs.ANGLE_ENABLED }} accesskit=${{ steps.accesskit-sdk.outputs.ACCESSKIT_ENABLED }}
          platform: windows
          target: ${{ matrix.target }}
        env:
          MSYSTEM: ${{ matrix.mingw-msystem }}
          # Godot checks MSVC before MSYS2; blank it so MinGW arch detection wins.
          VCTOOLSINSTALLDIR: ''

      - name: Checkout builder repo (cache purge script)
        uses: actions/checkout@v6
        with:
          repository: appsinacup/action_godot_builder
          path: builder_repo
          fetch-depth: 1

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: windows-${{ matrix.target }}${{ matrix.mono-flags }}-${{ matrix.scons-flags }}-${{ matrix.toolchain }}-${{ matrix.lto }}
          purge-cache-script: builder_repo/misc/scripts/purge_cache.py
        continue-on-error: true

      - name: Build .NET solutions
        if: matrix.build-mono
        run: |
          dotnet --info
          ./modules/mono/build_scripts/build_assemblies.py --godot-output-dir=./bin --godot-platform=windows --werror

      - name: Prepare artifact
        run: |
          Remove-Item bin/build_deps -Recurse -Force -ErrorAction SilentlyContinue

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-${{ matrix.target }}${{ matrix.mono-flags }}-${{ matrix.scons-flags }}-${{ matrix.toolchain }}-${{ matrix.lto }}
          path: bin
